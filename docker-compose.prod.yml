# Production override — Linux servers with Docker Engine (not Docker Desktop).
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# On Linux, network_mode: host gives the discovery agent direct access to the
# host's physical NIC — real ARP, real MACs, multicast, everything.

services:
  discovery-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - AUDITFORGE_AGENT_MODE=1
    restart: unless-stopped

  backend:
    environment:
      - DISCOVERY_AGENT_HOST=localhost
      - DISCOVERY_AGENT_PORT=37120
    depends_on:
      - discovery-agent
    extra_hosts:
      - "host.docker.internal:host-gateway"
