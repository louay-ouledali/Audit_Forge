version: "3.8"

services:
  discovery-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - AUDITFORGE_AGENT_MODE=1
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./benchmarks:/app/benchmarks
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=sqlite:///data/auditforge.db
      - DOCKER_HOST_MODE=bridge
      - DISCOVERY_AGENT_HOST=host.docker.internal
      - DISCOVERY_AGENT_PORT=37120
    depends_on:
      - discovery-agent
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
