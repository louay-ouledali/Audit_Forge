services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./data:/app/data
      - ./benchmarks:/app/benchmarks
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SECRET_KEY=${SECRET_KEY:-autogenerated-docker-key-change-me-in-prod}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - APP_ENV=${APP_ENV:-development}
      - DATABASE_URL=sqlite:///data/auditforge.db
      - DOCKER_HOST_MODE=bridge
      - DISCOVERY_AGENT_HOST=discovery-agent
      - DISCOVERY_AGENT_PORT=37120
      - SERVER_PORT=${SERVER_PORT:-8000}
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - discovery-agent

  discovery-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "127.0.0.1:37120:37120"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
